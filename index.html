<body>
    <base href="https://www.digicert.com/help/">
    <style>
        @font-face {
            font-family: 'UbuntuLight';
            src: url('/kb/css/fonts/Ubuntu-L.ttf?ff');
            font-weight: normal;
            font-style: normal
        }
    </style>
    <template shadowrootmode="open">
        <style>
            * {
                box-sizing: border-box;
            }

            div#results,
            div#results p,
            div#results pre,
            div#results h2 {
                font-family: UbuntuLight, Arial;
            }

            div#results {
                background: #FFF;
                border: 2px solid #999;
                border-radius: 12px;
                padding: 24px 55px;
                font-size: 13px;
                color: #000;
                width: 700px;
                margin-bottom: 48px;
            }

            div#results p {
                font-size: 12px;
                color: #000;
            }

            div#results h2 {
                margin-left: -35px;
                padding-left: 35px;
                margin-bottom: 1em;
                font-weight: normal;
            }

            div#results h2.ok {
                background: url(/kb/images/icons/result-ok.gif) no-repeat 0 center;
                color: #007EC4;
            }

            div#results h2.warning {
                background: url(/kb/images/icons/result-warning.gif) no-repeat 0 center;
                color: #550;
            }

            div#results h2.error {
                background: url(/kb/images/icons/result-error.gif) no-repeat 0 center;
                color: #500;
            }

            td.ok {
                background: url(/kb/images/icons/result-ok.gif) no-repeat 0 center;
                color: #007EC4;
            }

            td.error {
                background: url(/kb/images/icons/result-error.gif) no-repeat 0 center;
                color: #500;
            }

            div#results h1 {
                color: #000;
                font-weight: bold;
                margin-bottom: 1em;
                margin-left: -35px;
                padding-left: 35px;
                border-bottom: 2px solid #999;
            }

            div#chain table tr td {
                color: #000;
                font-size: 14px;
            }

            table td {
                vertical-align: top;
                padding: 5px;
            }

            div#CertDetails {
                margin: 0 0 1em 15px;
            }

            div#CertDetails p {
                font-family: Courier, "Courier New", sans-serif;
                font-size: 12px;
                text-indent: -15px;
                margin: 0;
            }
        </style>
        <div id="results"></div>
        <script>
            const host = new URL(location).searchParams.get('host')
            if (host) {
                document.body.shadowRoot.getElementById('results').innerHTML = 'loading...'
                const handle = r => r.text().then(html => document.body.shadowRoot.getElementById('results').innerHTML = html)
                if (host === 'example.com') {
                    fetch('https://gist.githubusercontent.com/GitHub30/abeb1cc6c4fcf51b93ce51de37fccf41/raw/example.com.html').then(handle)
                } else {
                    fetch('https://cors.7t.workers.dev/https://www.digicert.com/api/check-host.php', {
                        method: 'POST',
                        headers: {
                            'content-type': 'application/x-www-form-urlencoded',
                        },
                        body: 'host=' + host
                    }).then(handle)
                }
            }
        </script>
    </template>

</body>
